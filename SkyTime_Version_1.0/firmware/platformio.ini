[platformio]
default_envs = esp32-p4-st7789-spi

[env:esp32-p4-st7789-spi]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/stable/platform-espressif32.zip
#platform = espressif32
board = esp32-p4
framework = arduino

build_flags = 
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1

monitor_speed = 115200
upload_speed = 921600

lib_deps = 
    moononournation/GFX Library for Arduino
    mikalhart/TinyGPSPlus

; Arduino GFX Configuration for ST7789 (ESP32-P4 COMPATIBLE!)
; SPI Pins (all on right header):
;   SCL (Clock) → GPIO20
;   SDA (MOSI)  → GPIO23
;   CS          → GPIO26
;   DC          → GPIO27
;   RES         → GPIO32
;   BLK         → GPIO33
;
; I2C Pins (reserved for future):
;   SDA → GPIO6
;   SCL → GPIO7

; Build shortcuts (VS Code):
; Build: Ctrl+Alt+B
; Upload: Ctrl+Alt+U (press BOOT when "Connecting...")
; Monitor: Ctrl+Alt+M
; Clean: Ctrl+Alt+C
